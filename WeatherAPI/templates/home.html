<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Data API</title>
</head>
<body>
<h1>Weather Data API</h1>
<p>URL format: http://127.0.0.1:5000/api/v1/station/date</p>
<p>(1 Station : One Date): http://127.0.0.1:5000/api/v1/10/1988-10-25</p>
<p>(1 Station : All dates): http://127.0.0.1:5000/api/v1/10</p>
<p>(1 Station : One Year): http://127.0.0.1:5000/api/v1/year/10/1998</p>
<p>{{data|safe}}</p>
</body>
</html>
